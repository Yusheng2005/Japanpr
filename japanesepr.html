<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日文單字測驗練習</title>
    <!-- 引入字體 -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <!-- Cloudflare Turnstile 驗證腳本 -->
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
    
    <style>
        /* 基礎設定 */
        * { box-sizing: border-box; font-family: 'Noto Sans TC', sans-serif; }
        body { 
            background: linear-gradient(135deg, #f6f8fd 0%, #eef2fa 100%);
            margin: 0; padding: 0; min-height: 100vh; 
            display: flex; flex-direction: column; align-items: center; 
            color: #334155;
        }
        
        /* 導覽列與頭像 */
        nav { 
            width: 100%; background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px);
            padding: 12px 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.03); 
            display: flex; justify-content: flex-end; align-items: center; 
            position: fixed; top: 0; left: 0; z-index: 100; 
        }
        .avatar-btn { 
            background: #ffffff; border: 2px solid #e2e8f0; border-radius: 50%; 
            width: 44px; height: 44px; font-size: 20px; cursor: pointer; 
            display: flex; justify-content: center; align-items: center; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .avatar-btn:hover { background: #f8fafc; border-color: #3b82f6; transform: scale(1.05); }
        .nav-menu { margin-right: 20px; font-weight: 700; color: #3b82f6; display: none; cursor: pointer; transition: 0.2s; }
        .nav-menu:hover { opacity: 0.8; }
        
        /* 主容器 */
        .container { 
            background: #ffffff; padding: 2.5rem 2rem; border-radius: 24px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.06), 0 2px 10px rgba(0,0,0,0.02); 
            width: 90%; max-width: 500px; 
            margin-top: 100px; margin-bottom: 20px; border: 1px solid #f1f5f9;
        }
        .hidden { display: none !important; }
        h1, h2, h3 { text-align: center; color: #0f172a; margin-top: 0;}
        h1 { font-weight: 900; font-size: 28px; margin-bottom: 30px; letter-spacing: 1px;}
        
        /* 表單與設定區 */
        .setting-group { margin-bottom: 24px; background: #f8fafc; padding: 16px; border-radius: 16px; }
        .setting-group > label { display: block; margin-bottom: 12px; font-weight: 700; color: #475569; font-size: 15px; }
        
        /* 書籤 (Tabs) 分類樣式 */
        .tabs-header {
            display: flex; gap: 8px; overflow-x: auto; margin-bottom: 15px;
            padding-bottom: 6px; border-bottom: 2px solid #e2e8f0;
        }
        .tabs-header::-webkit-scrollbar { height: 4px; }
        .tabs-header::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .tab-btn {
            background: transparent; border: none; padding: 8px 16px;
            font-size: 15px; font-weight: 700; color: #64748b; cursor: pointer;
            border-radius: 8px; transition: 0.2s; white-space: nowrap;
        }
        .tab-btn:hover { background: #e2e8f0; color: #334155; }
        .tab-btn.active {
            color: #3b82f6; background: #eff6ff;
            box-shadow: 0 2px 8px rgba(59, 130, 246, 0.15);
        }
        
        /* 單選與複選框美化 */
        .radio-group, .checkbox-group { display: flex; flex-wrap: wrap; gap: 12px; }
        .radio-group label, .checkbox-group label { 
            display: flex; align-items: center; cursor: pointer; font-size: 15px; 
            background: #ffffff; padding: 8px 16px; border-radius: 12px;
            border: 1px solid #cbd5e1; transition: 0.2s; font-weight: 500;
        }
        .radio-group label:hover, .checkbox-group label:hover { border-color: #94a3b8; background: #f1f5f9; }
        input[type="radio"], input[type="checkbox"] { accent-color: #3b82f6; width: 18px; height: 18px; margin-right: 8px; cursor: pointer; }
        
        /* 滑桿美化 */
        .range-container { display: flex; align-items: center; gap: 15px; padding: 5px 0; }
        input[type="range"] { flex-grow: 1; cursor: pointer; height: 8px; background: #e2e8f0; border-radius: 8px; outline: none; -webkit-appearance: none; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 22px; height: 22px; background: #3b82f6; border-radius: 50%; cursor: pointer; box-shadow: 0 2px 6px rgba(59, 130, 246, 0.4); transition: 0.2s; }
        input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.2); }
        .range-value-display { font-size: 18px; font-weight: 900; color: #3b82f6; min-width: 50px; text-align: right; }
        
        /* 輸入框美化 (後台) */
        input[type="text"], input[type="password"], input[type="file"] { 
            width: 100%; padding: 14px; margin-bottom: 15px; border: 2px solid #e2e8f0; 
            border-radius: 12px; font-size: 15px; transition: 0.3s; background: #f8fafc;
        }
        input[type="text"]:focus, input[type="password"]:focus { border-color: #3b82f6; outline: none; background: #ffffff; box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1); }

        /* 按鈕美化 */
        .btn { display: block; width: 100%; padding: 16px; margin: 12px 0; border: 2px solid transparent; border-radius: 16px; font-size: 18px; font-weight: 700; cursor: pointer; transition: all 0.2s; background: #f1f5f9; color: #334155; }
        .btn:hover:not(:disabled) { background: #e2e8f0; }
        .btn:active:not(:disabled) { transform: scale(0.98); }
        .btn-primary { background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); color: white; box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3); }
        .btn-primary:hover:not(:disabled) { box-shadow: 0 6px 20px rgba(59, 130, 246, 0.4); transform: translateY(-2px); }
        
        /* 管理員列表編輯與刪除按鈕 */
        .btn-danger { background: #ef4444; color: white; padding: 8px 16px; font-size: 14px; width: auto; display: inline-block; margin: 0; border-radius: 10px; border: none; font-weight: 700; cursor: pointer; transition: 0.2s; box-shadow: 0 2px 8px rgba(239, 68, 68, 0.3); }
        .btn-danger:hover { background: #dc2626; transform: translateY(-1px); }
        .btn-edit { background: #3b82f6; color: white; padding: 8px 16px; font-size: 14px; width: auto; display: inline-block; margin: 0 8px 0 0; border-radius: 10px; border: none; font-weight: 700; cursor: pointer; transition: 0.2s; box-shadow: 0 2px 8px rgba(59, 130, 246, 0.3); }
        .btn-edit:hover { background: #2563eb; transform: translateY(-1px); }

        /* 淡淺藍色結束測驗按鈕 */
        .btn-light-blue { 
            display: block; width: 100%; padding: 16px; margin: 30px 0 0 0; 
            border: 1px solid #bae6fd; border-radius: 16px; 
            font-size: 18px; font-weight: 700; cursor: pointer; 
            transition: all 0.2s; background: #e0f2fe; color: #0369a1; 
        }
        .btn-light-blue:hover { background: #bae6fd; color: #0284c7; border-color: #7dd3fc; }
        .btn-light-blue:active { transform: scale(0.98); }

        .btn:disabled { cursor: not-allowed; opacity: 0.5; }
        
        /* 測驗區與錯題 */
        .correct { background: #10b981 !important; color: white !important; border-color: #10b981 !important; box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3) !important; opacity: 1 !important; }
        .wrong { background: #ef4444 !important; color: white !important; border-color: #ef4444 !important; box-shadow: 0 4px 15px rgba(239, 68, 68, 0.3) !important; animation: shake 0.4s; opacity: 1 !important; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-6px); } 75% { transform: translateX(6px); } }
        
        .question-text { font-size: 40px; text-align: center; margin: 30px 0; font-weight: 900; color: #0f172a;}
        .question-text.clickable {
            cursor: pointer;
            transition: transform 0.2s, color 0.2s;
        }
        .question-text.clickable:hover {
            color: #3b82f6;
            transform: scale(1.05);
        }
        .audio-hint {
            font-size: 14px; color: #64748b; text-align: center;
            margin-top: -20px; margin-bottom: 25px; font-weight: 700;
        }

        .progress { text-align: center; color: #64748b; font-weight: 700; letter-spacing: 1px; font-size: 14px; text-transform: uppercase; }
        .score-display { font-size: 32px; text-align: center; font-weight: 900; margin: 20px 0; color: #3b82f6; }
        
        /* 錯題列表美化 */
        .mistake-list { max-height: 350px; overflow-y: auto; padding-right: 5px; margin-top: 15px; }
        .mistake-list::-webkit-scrollbar { width: 6px; }
        .mistake-list::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .mistake-item { background: #ffffff; padding: 16px; border: 1px solid #fee2e2; border-left: 6px solid #ef4444; margin-bottom: 12px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.02); }
        .mistake-q { font-weight: 900; font-size: 18px; margin-bottom: 8px; color: #0f172a;}
        .mistake-wrong { color: #ef4444; margin-bottom: 4px; font-weight: 500;}
        .mistake-correct { color: #10b981; font-weight: 700; }

        /* 管理員列表 */
        .admin-lesson-list { list-style: none; padding: 0; }
        
        /* 💡 V2.0.3 新增：拖曳排序時的視覺回饋樣式 */
        .admin-lesson-item { 
            display: flex; flex-direction: column; gap: 8px; background: #ffffff; 
            border: 1px solid #e2e8f0; padding: 12px 16px; border-radius: 12px; 
            margin-bottom: 10px; font-weight: 700; color: #334155; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
            transition: background-color 0.2s, border 0.2s, transform 0.2s;
            cursor: grab;
        }
        .admin-lesson-item:active { cursor: grabbing; }
        .admin-lesson-item.dragging {
            opacity: 0.4;
            background: #f1f5f9;
            border: 2px dashed #3b82f6 !important;
            transform: scale(0.98);
        }
        .admin-lesson-item.drag-over {
            border-top: 3px solid #3b82f6 !important;
            background: #eff6ff;
        }

        .admin-lesson-header { display: flex; justify-content: space-between; align-items: center; width: 100%;}
        .admin-badge { background: #e2e8f0; padding: 4px 8px; border-radius: 6px; font-size: 12px; color: #475569;}
        
        /* 載入動畫 */
        #loading-text { font-weight: 700; color: #3b82f6; display: flex; align-items: center; gap: 8px;}
        #loading-text::before { content: ""; width: 16px; height: 16px; border: 3px solid #3b82f6; border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* 頁底簽名 */
        footer { margin-top: auto; padding: 20px 0 30px; text-align: center; color: #94a3b8; font-size: 14px; font-weight: 700; letter-spacing: 0.5px; }
    </style>
</head>
<body>

<!-- 頂部導覽列 -->
<nav>
    <div id="nav-admin-text" class="nav-menu" onclick="showPage('admin-page')">管理員後台</div>
    <div id="nav-logout" class="nav-menu" style="color: #ef4444;" onclick="handleLogout()">登出</div>
    <button class="avatar-btn" onclick="toggleLoginModal()">👤</button>
</nav>

<!-- 登入視窗 -->
<div class="container hidden" id="login-page">
    <h2>管理員登入</h2>
    <input type="text" id="email" placeholder="信箱 (例如 user@admin.com)">
    <input type="password" id="password" placeholder="密碼">
    <button class="btn btn-primary" onclick="window.handleLogin()">登入</button>
    <button class="btn" onclick="showPage('setup-page')">取消</button>
</div>

<!-- 管理員後台 -->
<div class="container hidden" id="admin-page">
    <h2>管理員後台 ⚙️</h2>
    
    <div class="setting-group">
        <label>1. 上傳新單字 (JSON檔)</label>
        <input type="text" id="new-category-name" placeholder="輸入大分類名稱 (例如: 大家的日本語)">
        <input type="text" id="new-lesson-name" placeholder="輸入子課程名稱 (例如: 第一課)">
        <input type="file" id="json-upload" accept=".json">
        <button class="btn btn-primary" onclick="window.uploadJSON()">上傳並儲存 🚀</button>
    </div>

    <hr style="margin: 24px 0; border: 0; border-top: 2px dashed #e2e8f0;">

    <div class="setting-group">
        <label>2. 管理現有課程 (可直接上下拖曳排序 ☰)</label>
        <ul class="admin-lesson-list" id="admin-lesson-list">
            <!-- 課程列表 JS 產生 -->
        </ul>
    </div>

    <button class="btn" onclick="showPage('setup-page')">回測驗首頁</button>
</div>

<!-- 測驗設定首頁 -->
<div class="container" id="setup-page">
    <h1>日文單字測驗練習 🌸</h1>
    
    <!-- Turnstile 驗證區域 -->
    <div class="setting-group" id="turnstile-container">
        <label>請先完成安全驗證</label>
        <div style="display: flex; justify-content: center; margin: 10px 0;">
            <!-- ⚠️ 請將 data-sitekey 替換成你的 Turnstile Sitekey ⚠️ -->
            <div class="cf-turnstile" data-sitekey="0x4AAAAAADTIUGeeRzxpEX_0" data-callback="onTurnstileSuccess"></div>
        </div>
    </div>

    <div class="setting-group">
        <label>翻譯方向</label>
        <div class="radio-group">
            <label><input type="radio" name="direction" value="zh2ja" checked> 中文 ➔ 日文</label>
            <label><input type="radio" name="direction" value="ja2zh"> 日文 ➔ 中文</label>
        </div>
    </div>

    <div class="setting-group">
        <label>練習範圍</label>
        <div id="loading-text">請先完成上方安全驗證...</div>
        
        <div id="dynamic-categories-container" class="hidden">
            <div class="tabs-header" id="tabs-header">
                <!-- 標籤按鈕會產生在這裡 -->
            </div>
            <div id="tabs-content">
                <!-- 勾選框內容會產生在這裡 -->
            </div>
        </div>

    </div>

    <div class="setting-group">
        <label>測驗題數</label>
        <div class="range-container">
            <input type="range" id="question-count" min="5" max="100" step="5" value="10" oninput="document.getElementById('range-display').innerText = this.value">
            <div class="range-value-display"><span id="range-display">10</span> 題</div>
        </div>
    </div>

    <button class="btn btn-primary" id="start-btn" onclick="startQuiz()" disabled>開始測驗</button>
</div>

<!-- 測驗頁面 -->
<div class="container hidden" id="quiz-page">
    <div class="progress" id="progress-text">題數: 1 / 10</div>
    
    <div class="question-text" id="question-text">題目</div>
    <div id="audio-hint" class="audio-hint hidden">🔊 點擊單字可發音</div>
    
    <div id="options-container"></div>
    
    <button class="btn-light-blue" onclick="earlyEndQuiz()">提早結束測驗</button>
</div>

<!-- 結果頁面 -->
<div class="container hidden" id="result-page">
    <h2>測驗結束 🎉</h2>
    <div class="score-display" id="score-text">分數: 0 / 10</div>
    <div id="mistakes-container">
        <h3 style="color: #ef4444; margin-top: 30px;">錯題檢討</h3>
        <div class="mistake-list" id="mistake-list"></div>
    </div>
    <button class="btn btn-primary" style="margin-top: 20px;" onclick="showPage('setup-page')">繼續練習</button>
</div>

<!-- V2.0.3 頁底 -->
<footer>
    V 2.0.3 &nbsp;&nbsp;|&nbsp;&nbsp; Built by Minami
</footer>

<!-- Turnstile 成功驗證的回呼 -->
<script>
    window.onTurnstileSuccess = async function(token) {
        const loadingEl = document.getElementById('loading-text');
        loadingEl.innerText = '安全驗證成功，正在載入資料庫...';
        
        try {
            // ⚠️ 請將此 URL 替換成你的 Cloudflare Worker 網址 ⚠️
            const workerUrl = 'https://firebase-key-proxy.y-ys-sl-l1226.workers.dev'; 
            
            const response = await fetch(workerUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token })
            });

            if (!response.ok) {
                const errData = await response.json().catch(() => ({}));
                const details = errData.details ? `原因：${JSON.stringify(errData.details)}` : '';
                throw new Error(`中介伺服器驗證失敗，無法獲取安全金鑰。${details}`);
            }

            const firebaseConfig = await response.json();
            window.dispatchEvent(new CustomEvent('init-firebase', { detail: firebaseConfig }));
            document.getElementById('turnstile-container').classList.add('hidden');

        } catch (err) {
            loadingEl.innerHTML = `<span style="color:#ef4444; font-weight:bold;">載入失敗：${err.message}</span>`;
            console.error(err);
        }
    }
</script>

<!-- 載入 Firebase 模組 -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, collection, getDocs, doc, setDoc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    let auth, db;
    let vocabulariesData =[]; 
    window.dbLessons =[]; 

    // 💡 V2.0.3 修正：極速穩定版 Tab 切換，徹底解決「其他資料夾無法點選」Bug
    window.switchTab = function(btn, tabId) {
        document.querySelectorAll('.tab-pane').forEach(pane => pane.style.display = 'none');
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        
        const targetPane = document.getElementById(tabId);
        if (targetPane) {
            targetPane.style.display = 'flex';
        }
        btn.classList.add('active');
    }

    window.addEventListener('init-firebase', (e) => {
        const firebaseConfig = e.detail;
        const app = initializeApp(firebaseConfig);
        auth = getAuth(app);
        db = getFirestore(app);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('nav-admin-text').style.display = 'block';
                document.getElementById('nav-logout').style.display = 'block';
            } else {
                document.getElementById('nav-admin-text').style.display = 'none';
                document.getElementById('nav-logout').style.display = 'none';
            }
        });

        // 綁定動態函數
        window.handleLogin = async function() {
            const email = document.getElementById('email').value;
            const pw = document.getElementById('password').value;
            try {
                await signInWithEmailAndPassword(auth, email, pw);
                alert("登入成功！");
                showPage('admin-page');
                document.getElementById('email').value = '';
                document.getElementById('password').value = '';
            } catch (error) { alert("登入失敗，請檢查帳號密碼。"); }
        }

        window.handleLogout = async function() {
            await signOut(auth);
            alert("已登出！");
            showPage('setup-page');
        }

        window.uploadJSON = function() {
            const fileInput = document.getElementById('json-upload');
            const categoryName = document.getElementById('new-category-name').value.trim() || '未分類';
            const lessonName = document.getElementById('new-lesson-name').value.trim();
            
            if (!lessonName || fileInput.files.length === 0) {
                alert('請輸入課程名稱並選擇檔案！');
                return;
            }

            const file = fileInput.files[0];
            const reader = new FileReader();

            reader.onload = async function(e) {
                try {
                    const wordsArray = JSON.parse(e.target.result);
                    if (!Array.isArray(wordsArray) || !wordsArray[0].zh || !wordsArray[0].ja) {
                        throw new Error("格式錯誤");
                    }

                    const docId = 'lesson_' + Date.now();
                    await setDoc(doc(db, "lessons", docId), {
                        category: categoryName, 
                        name: lessonName,
                        words: wordsArray,
                        order: Date.now() 
                    });

                    alert('上傳成功！');
                    document.getElementById('new-lesson-name').value = '';
                    fileInput.value = '';
                    loadLessonsFromDB();

                } catch (err) {
                    alert('解析失敗！請確保檔案是標準的 JSON 陣列格式，包含 zh 與 ja 屬性。');
                    console.error(err);
                }
            };
            reader.readAsText(file);
        }

        window.deleteLesson = async function(docId) {
            if(confirm("確定要刪除這課的單字嗎？")) {
                try {
                    await deleteDoc(doc(db, "lessons", docId));
                    alert("已刪除！");
                    loadLessonsFromDB();
                } catch (err) { alert("刪除失敗！"); }
            }
        }

        window.editLesson = async function(docId, oldName, oldCat) {
            const newCat = prompt("請輸入新的「分類名稱」：", oldCat);
            if (newCat === null) return; 
            
            const newName = prompt("請輸入新的「課程名稱」：", oldName);
            if (newName === null) return; 

            if (newCat.trim() === "" || newName.trim() === "") {
                alert("分類與名稱不能為空白喔！");
                return;
            }

            try {
                await updateDoc(doc(db, "lessons", docId), {
                    category: newCat.trim(),
                    name: newName.trim()
                });
                alert("修改成功！");
                loadLessonsFromDB();
            } catch (err) {
                alert("修改失敗！");
                console.error(err);
            }
        }

        // 💡 V2.0.3 新增：原生拖曳排序 (HTML5 Drag & Drop API) 核心後端邏輯
        let draggedIndex = null;

        window.moveLessonDragStart = function(e, index) {
            draggedIndex = index;
            e.dataTransfer.effectAllowed = 'move';
            e.currentTarget.classList.add('dragging');
        }

        window.moveLessonDragEnd = function(e) {
            e.currentTarget.classList.remove('dragging');
            document.querySelectorAll('.admin-lesson-item').forEach(item => {
                item.classList.remove('drag-over');
            });
        }

        window.moveLessonDragOver = function(e) {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
        }

        window.moveLessonDragEnter = function(e) {
            e.currentTarget.classList.add('drag-over');
        }

        window.moveLessonDragLeave = function(e) {
            e.currentTarget.classList.remove('drag-over');
        }

        window.moveLessonDrop = async function(e, targetIndex) {
            e.preventDefault();
            if (draggedIndex === null || draggedIndex === targetIndex) return;

            const draggedItem = vocabulariesData[draggedIndex];
            
            // 1. 在本地陣列重新排序
            vocabulariesData.splice(draggedIndex, 1);
            vocabulariesData.splice(targetIndex, 0, draggedItem);

            try {
                // 2. 使用 Promise.all 平行處理，將全新排序後的 order 儲存回 Firestore 
                const updatePromises = vocabulariesData.map((item, idx) => {
                    const newOrder = idx * 10;
                    item.order = newOrder; // 更新本地快照
                    return updateDoc(doc(db, "lessons", item.id), { order: newOrder });
                });
                
                await Promise.all(updatePromises);
                loadLessonsFromDB(); // 重新整理資料夾與列表
            } catch (err) {
                alert("排序更新失敗！");
                console.error(err);
            }
        }

        loadLessonsFromDB();
    });

    window.showPage = function(pageId) {
        document.querySelectorAll('.container').forEach(c => c.classList.add('hidden'));
        document.getElementById(pageId).classList.remove('hidden');
        if(pageId === 'setup-page' && auth) loadLessonsFromDB(); 
    }

    // 讀取課程並渲染
    async function loadLessonsFromDB() {
        if (!db) return;
        document.getElementById('loading-text').classList.remove('hidden');
        document.getElementById('dynamic-categories-container').classList.add('hidden');
        document.getElementById('start-btn').disabled = true;
        
        try {
            const querySnapshot = await getDocs(collection(db, "lessons"));
            vocabulariesData =[];
            let adminHtml = '';
            let categoriesMap = {};

            querySnapshot.forEach((doc) => {
                const data = doc.data();
                const docId = doc.id;
                const catName = data.category || '未分類'; 
                
                vocabulariesData.push({ 
                    id: docId, 
                    name: data.name, 
                    category: catName, 
                    words: data.words,
                    order: data.order !== undefined ? data.order : 0 
                });
            });

            // 依據 order 排序
            vocabulariesData.sort((a, b) => {
                if (a.order !== b.order) {
                    return a.order - b.order;
                }
                return a.id.localeCompare(b.id);
            });

            window.dbLessons = vocabulariesData;

            if (vocabulariesData.length === 0) {
                document.getElementById('tabs-content').innerHTML = '<span style="color:#ef4444; font-weight:bold;">目前沒有單字，請管理員上傳！</span>';
                document.getElementById('tabs-header').innerHTML = '';
            } else {
                let tabsHtml = '';
                let panesHtml = '';
                let index = 0;

                // 建立有序的大分類 Map
                vocabulariesData.forEach((item) => {
                    const catName = item.category;
                    if (!categoriesMap[catName]) categoriesMap[catName] = [];
                    categoriesMap[catName].push({ id: item.id, name: item.name });
                });

                for (let cat in categoriesMap) {
                    const isFirst = (index === 0);
                    const activeClass = isFirst ? 'active' : '';
                    const displayStyle = isFirst ? 'display: flex;' : 'display: none;';
                    const tabId = 'pane-' + index;
                    
                    // 💡 V2.0.3 修正：onclick 修改為將 `this` 傳遞進去，確保跨平台百分之百能點擊切換
                    tabsHtml += `<button class="tab-btn ${activeClass}" onclick="switchTab(this, '${tabId}')">${cat}</button>`;
                    
                    panesHtml += `<div class="tab-pane checkbox-group" id="${tabId}" style="${displayStyle}">`;
                    categoriesMap[cat].forEach(lesson => {
                        panesHtml += `<label><input type="checkbox" name="category" value="${lesson.id}"> ${lesson.name}</label>`;
                    });
                    panesHtml += `</div>`;
                    
                    index++;
                }

                document.getElementById('tabs-header').innerHTML = tabsHtml;
                document.getElementById('tabs-content').innerHTML = panesHtml;
                document.getElementById('start-btn').disabled = false;
            }
            
            // 💡 V2.0.3 新增：將管理員列表修改為原生拖曳架構 (綁定 HTML5 Drag & Drop 事件)
            vocabulariesData.forEach((item, idx) => {
                const safeName = item.name.replace(/'/g, "\\'");
                const safeCat = item.category.replace(/'/g, "\\'");

                adminHtml += `
                    <li class="admin-lesson-item" draggable="true" 
                        ondragstart="moveLessonDragStart(event, ${idx})" 
                        ondragend="moveLessonDragEnd(event)" 
                        ondragover="moveLessonDragOver(event)" 
                        ondragenter="moveLessonDragEnter(event)" 
                        ondragleave="moveLessonDragLeave(event)" 
                        ondrop="moveLessonDrop(event, ${idx})">
                        <div class="admin-lesson-header">
                            <span style="display: flex; align-items: center; gap: 8px; user-select: none;">
                                <span style="color: #94a3b8; cursor: grab; font-size: 18px; font-weight: bold; margin-right: 4px;">☰</span>
                                ${item.name} (共 ${item.words.length} 字)
                            </span>
                            <div>
                                <button class="btn-edit" onclick="editLesson('${item.id}', '${safeName}', '${safeCat}')">編輯</button>
                                <button class="btn-danger" onclick="deleteLesson('${item.id}')">刪除</button>
                            </div>
                        </div>
                        <span class="admin-badge">分類：${item.category}</span>
                    </li>`;
            });

            document.getElementById('admin-lesson-list').innerHTML = adminHtml;
            document.getElementById('loading-text').classList.add('hidden');
            document.getElementById('dynamic-categories-container').classList.remove('hidden');

        } catch (error) {
            console.error("載入失敗:", error);
            document.getElementById('loading-text').innerText = "載入失敗，請檢查網路或資料庫設定。";
        }
    }
</script>

<!-- 測驗邏輯腳本 -->
<script>
    let quizData =[];
    let currentQuestionIndex = 0;
    let score = 0;
    let mistakes =[];
    let direction = 'zh2ja'; 
    let fullPool =[];
    
    let answeredCount = 0;
    let nextQuestionTimeout = null;

    window.speakJapanese = function(text) {
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'ja-JP';
            window.speechSynthesis.speak(utterance);
        } else {
            console.warn('您的瀏覽器不支援語音播放功能。');
        }
    }

    function shuffleArray(array) {
        let currentIndex = array.length, randomIndex;
        while (currentIndex !== 0) {
            randomIndex = Math.floor(Math.random() * currentIndex);
            currentIndex--;
            [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
        }
        return array;
    }

    function startQuiz() {
        direction = document.querySelector('input[name="direction"]:checked').value;
        const count = parseInt(document.getElementById('question-count').value);
        
        const selectedIds = Array.from(document.querySelectorAll('input[name="category"]:checked')).map(cb => cb.value);
        
        if (selectedIds.length === 0) {
            alert('請至少勾選一個練習範圍！(你可以切換書籤跨類別勾選)');
            return;
        }

        fullPool =[];
        window.dbLessons.forEach(lesson => {
            if (selectedIds.includes(lesson.id)) {
                fullPool = fullPool.concat(lesson.words);
            }
        });

        if(fullPool.length === 0) {
            alert('所選範圍內沒有單字！'); return;
        }

        quizData =[];
        let shuffledPool = shuffleArray([...fullPool]);
        for (let i = 0; i < count; i++) {
            quizData.push(shuffledPool[i % shuffledPool.length]);
        }
        quizData = shuffleArray(quizData);

        currentQuestionIndex = 0;
        score = 0;
        mistakes =[];
        answeredCount = 0;
        if(nextQuestionTimeout) clearTimeout(nextQuestionTimeout);

        showPage('quiz-page');
        showQuestion();
    }

    function showQuestion() {
        const currentItem = quizData[currentQuestionIndex];
        document.getElementById('progress-text').innerText = `題數: ${currentQuestionIndex + 1} / ${quizData.length}`;
        
        const qText = direction === 'zh2ja' ? currentItem.zh : currentItem.ja;
        const ansField = direction === 'zh2ja' ? 'ja' : 'zh';
        
        const qElement = document.getElementById('question-text');
        const audioHint = document.getElementById('audio-hint');
        
        qElement.innerText = qText;

        if (direction === 'ja2zh') {
            qElement.classList.add('clickable');
            qElement.title = '點擊聽取日文發音 🔊';
            qElement.onclick = () => speakJapanese(currentItem.ja);
            audioHint.classList.remove('hidden');
        } else {
            qElement.classList.remove('clickable');
            qElement.title = '';
            qElement.onclick = null;
            audioHint.classList.add('hidden');
        }

        let options = [currentItem];
        
        let distractors = shuffleArray([...fullPool]).filter(item => item[ansField] !== currentItem[ansField]);
        options = options.concat(distractors.slice(0, 3));
        options = shuffleArray(options);

        const optionsContainer = document.getElementById('options-container');
        optionsContainer.innerHTML = '';

        options.forEach(option => {
            const btn = document.createElement('button');
            btn.className = 'btn';
            btn.innerText = option[ansField];
            btn.onclick = () => handleAnswer(btn, option, currentItem, ansField);
            optionsContainer.appendChild(btn);
        });
    }

    function handleAnswer(selectedBtn, selectedOption, correctItem, ansField) {
        const allBtns = document.getElementById('options-container').querySelectorAll('button');
        allBtns.forEach(btn => btn.disabled = true);
        
        answeredCount++; 

        const isCorrect = selectedOption[ansField] === correctItem[ansField];

        if (isCorrect) {
            selectedBtn.classList.add('correct');
            score++;
        } else {
            selectedBtn.classList.add('wrong');
            allBtns.forEach(btn => {
                if (btn.innerText === correctItem[ansField]) {
                    btn.classList.add('correct');
                }
            });

            mistakes.push({
                q: direction === 'zh2ja' ? correctItem.zh : correctItem.ja,
                wrongAns: selectedOption[ansField],
                correctAns: correctItem[ansField]
            });
        }

        nextQuestionTimeout = setTimeout(() => {
            currentQuestionIndex++;
            if (currentQuestionIndex < quizData.length) {
                showQuestion();
            } else {
                showResult(answeredCount);
            }
        }, 600); 
    }

    window.earlyEndQuiz = function() {
        if (answeredCount === 0) {
            alert("你還沒作答任何題目，即將返回首頁！");
            showPage('setup-page');
            return;
        }
        if (nextQuestionTimeout) clearTimeout(nextQuestionTimeout);
        showResult(answeredCount);
    }

    function showResult(totalQuestions) {
        if (!totalQuestions) totalQuestions = quizData.length;
        
        showPage('result-page');
        document.getElementById('score-text').innerText = `分數: ${score} / ${totalQuestions}`;

        const mistakeContainer = document.getElementById('mistakes-container');
        const mistakeList = document.getElementById('mistake-list');
        mistakeList.innerHTML = '';

        if (mistakes.length === 0) {
            mistakeContainer.style.display = 'none';
        } else {
            mistakeContainer.style.display = 'block';
            mistakes.forEach(m => {
                const item = document.createElement('div');
                item.className = 'mistake-item';
                item.innerHTML = `
                    <div class="mistake-q">📌 ${m.q}</div>
                    <div class="mistake-wrong">你的答案：${m.wrongAns} ❌</div>
                    <div class="mistake-correct">正確答案：${m.correctAns} ✅</div>
                `;
                mistakeList.appendChild(item);
            });
        }
    }
</script>
</body>
</html>
