<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日文五十音練習</title>
    <style>
        :root {
            --primary-color: #4CAF50;
            --hover-color: #45a049;
            --bg-color: #f5f7fa;
            --card-bg: #ffffff;
            --text-color: #333333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        h1 {
            margin-top: 0;
            color: var(--primary-color);
        }

        /* 設定區塊樣式 */
        .setting-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .setting-group h3 {
            margin-bottom: 10px;
            border-bottom: 2px solid #eee;
            padding-bottom: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .checkbox-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 10px;
        }

        .checkbox-item label {
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        /* 拉桿樣式 */
        input[type=range] {
            width: 100%;
            margin-top: 10px;
            cursor: pointer;
        }

        button.start-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 18px;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            transition: background-color 0.3s;
            margin-top: 10px;
        }

        button.start-btn:hover {
            background-color: var(--hover-color);
        }

        /* 測驗區塊樣式 */
        #quiz-screen {
            display: none;
        }

        .question-box {
            font-size: 80px;
            font-weight: bold;
            margin: 30px 0;
            height: 120px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .option-btn {
            background-color: #e0e0e0;
            border: none;
            padding: 15px;
            font-size: 24px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .option-btn:hover {
            background-color: #d0d0d0;
        }

        .option-btn.correct {
            background-color: #4CAF50 !important;
            color: white;
        }

        .option-btn.wrong {
            background-color: #f44336 !important;
            color: white;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            font-size: 16px;
            color: #666;
            font-weight: bold;
        }

        .back-btn {
            background-color: transparent;
            border: 1px solid #ccc;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 20px;
        }
        
        .back-btn:hover {
            background-color: #f0f0f0;
        }
    </style>
</head>
<body>

<div class="container">
    <!-- 設定畫面 -->
    <div id="setup-screen">
        <h1>五十音練習</h1>
        
        <div class="setting-group">
            <h3>1. 選擇模式</h3>
            <label><input type="radio" name="mode" value="1" checked> 日文 ➔ 羅馬拼音</label><br>
            <label><input type="radio" name="mode" value="2"> 羅馬拼音 ➔ 日文</label>
        </div>

        <div class="setting-group">
            <h3>2. 選擇字體</h3>
            <label><input type="radio" name="charType" value="hiragana" checked> 平假名 (あ, い...)</label><br>
            <label><input type="radio" name="charType" value="katakana"> 片假名 (ア, イ...)</label>
        </div>

        <div class="setting-group">
            <h3>
                <span>3. 選擇範圍</span>
                <span>
                    <button type="button" onclick="selectAll(true)" style="font-size:12px; cursor:pointer;">全選</button> 
                    <button type="button" onclick="selectAll(false)" style="font-size:12px; cursor:pointer;">全不選</button>
                </span>
            </h3>
            <div class="checkbox-grid" id="range-checkboxes">
                <!-- 透過 JS 動態產生核取方塊 -->
            </div>
        </div>

        <!-- 新增：題數選擇拉桿 -->
        <div class="setting-group">
            <h3>
                <span>4. 測驗題數</span>
                <span style="color: var(--primary-color);"><span id="limit-display">20</span> 題</span>
            </h3>
            <input type="range" id="question-limit" min="5" max="100" step="5" value="20" oninput="updateLimitDisplay(this.value)">
        </div>

        <button class="start-btn" onclick="startQuiz()">開始練習</button>
    </div>

    <!-- 測驗畫面 -->
    <div id="quiz-screen">
        <div class="status-bar">
            <span id="score-display">分數: 0</span>
            <span id="count-display">第 1 / 20 題</span>
        </div>
        
        <div class="question-box" id="question-text">あ</div>
        
        <div class="options-grid" id="options-container">
            <!-- 選項按鈕會由 JS 產生 -->
        </div>

        <button class="back-btn" onclick="goBack()">強制結束</button>
    </div>
</div>

<script>
    // 五十音資料庫 (h: 平假名, k: 片假名, r: 羅馬拼音)
    const gojuonData = [
        { label: 'あ行', items:[{h:'あ',k:'ア',r:'a'}, {h:'い',k:'イ',r:'i'}, {h:'う',k:'ウ',r:'u'}, {h:'え',k:'エ',r:'e'}, {h:'お',k:'オ',r:'o'}] },
        { label: 'か行', items:[{h:'か',k:'カ',r:'ka'}, {h:'き',k:'キ',r:'ki'}, {h:'く',k:'ク',r:'ku'}, {h:'け',k:'ケ',r:'ke'}, {h:'こ',k:'コ',r:'ko'}] },
        { label: 'さ行', items:[{h:'さ',k:'サ',r:'sa'}, {h:'し',k:'シ',r:'shi'}, {h:'す',k:'ス',r:'su'}, {h:'せ',k:'セ',r:'se'}, {h:'そ',k:'ソ',r:'so'}] },
        { label: 'た行', items:[{h:'た',k:'タ',r:'ta'}, {h:'ち',k:'チ',r:'chi'}, {h:'つ',k:'ツ',r:'tsu'}, {h:'て',k:'テ',r:'te'}, {h:'と',k:'ト',r:'to'}] },
        { label: 'な行', items:[{h:'な',k:'ナ',r:'na'}, {h:'に',k:'ニ',r:'ni'}, {h:'ぬ',k:'ヌ',r:'nu'}, {h:'ね',k:'ネ',r:'ne'}, {h:'の',k:'ノ',r:'no'}] },
        { label: 'は行', items:[{h:'は',k:'ハ',r:'ha'}, {h:'ひ',k:'ヒ',r:'hi'}, {h:'ふ',k:'フ',r:'fu'}, {h:'へ',k:'ヘ',r:'he'}, {h:'ほ',k:'ホ',r:'ho'}] },
        { label: 'ま行', items:[{h:'ま',k:'マ',r:'ma'}, {h:'み',k:'ミ',r:'mi'}, {h:'む',k:'ム',r:'mu'}, {h:'め',k:'メ',r:'me'}, {h:'も',k:'モ',r:'mo'}] },
        { label: 'や行', items:[{h:'や',k:'ヤ',r:'ya'}, {h:'ゆ',k:'ユ',r:'yu'}, {h:'よ',k:'ヨ',r:'yo'}] },
        { label: 'ら行', items:[{h:'ら',k:'ラ',r:'ra'}, {h:'り',k:'リ',r:'ri'}, {h:'る',k:'ル',r:'ru'}, {h:'れ',k:'レ',r:'re'}, {h:'ろ',k:'ロ',r:'ro'}] },
        { label: 'わ行', items:[{h:'わ',k:'ワ',r:'wa'}, {h:'を',k:'ヲ',r:'wo'}] },
        { label: 'ん', items:[{h:'ん',k:'ン',r:'n'}] }
    ];

    // 初始化介面：動態生成範圍核取方塊
    const checkboxContainer = document.getElementById('range-checkboxes');
    gojuonData.forEach((group, index) => {
        const div = document.createElement('div');
        div.className = 'checkbox-item';
        // 預設先勾選あ行
        const checkedStr = index === 0 ? 'checked' : '';
        div.innerHTML = `<label><input type="checkbox" value="${index}" class="range-cb" ${checkedStr}> ${group.label}</label>`;
        checkboxContainer.appendChild(div);
    });

    function selectAll(check) {
        document.querySelectorAll('.range-cb').forEach(cb => cb.checked = check);
    }

    // 更新拉桿數字顯示
    function updateLimitDisplay(val) {
        document.getElementById('limit-display').innerText = val;
    }

    // 遊戲狀態變數
    let currentPool =[];
    let currentMode = '1'; 
    let charType = 'hiragana';
    let score = 0;
    let questionCount = 0;
    let maxQuestions = 20; // 總題數
    let currentQuestion = null;

    // 開始測驗
    function startQuiz() {
        currentPool =[];
        const checkboxes = document.querySelectorAll('.range-cb:checked');
        
        // 收集選取的字元到題庫中
        checkboxes.forEach(cb => {
            const index = parseInt(cb.value);
            currentPool = currentPool.concat(gojuonData[index].items);
        });

        if (currentPool.length < 3) {
            alert('請至少選擇包含 3 個字元以上的範圍！');
            return;
        }

        // 取得設定值
        currentMode = document.querySelector('input[name="mode"]:checked').value;
        charType = document.querySelector('input[name="charType"]:checked').value;
        maxQuestions = parseInt(document.getElementById('question-limit').value);
        
        // 重置分數並切換畫面
        score = 0;
        questionCount = 0;
        document.getElementById('setup-screen').style.display = 'none';
        document.getElementById('quiz-screen').style.display = 'block';
        
        nextQuestion();
    }

    // 產生下一題
    function nextQuestion() {
        questionCount++;
        document.getElementById('score-display').innerText = `分數: ${score}`;
        document.getElementById('count-display').innerText = `第 ${questionCount} / ${maxQuestions} 題`;

        // 1. 隨機選出正確答案
        const correctIdx = Math.floor(Math.random() * currentPool.length);
        currentQuestion = currentPool[correctIdx];

        // 2. 選出兩個錯誤答案
        let wrongOptions =[];
        while (wrongOptions.length < 2) {
            const randomIdx = Math.floor(Math.random() * currentPool.length);
            // 確保錯誤選項不等於正確選項，且沒有重複
            if (randomIdx !== correctIdx && !wrongOptions.includes(currentPool[randomIdx])) {
                wrongOptions.push(currentPool[randomIdx]);
            }
        }

        // 3. 組合選項並打亂順序
        let options =[currentQuestion, wrongOptions[0], wrongOptions[1]];
        options.sort(() => Math.random() - 0.5);

        // 4. 更新畫面 (判斷模式與字體)
        const questionEl = document.getElementById('question-text');
        const optionsContainer = document.getElementById('options-container');
        optionsContainer.innerHTML = '';

        const getJpChar = (item) => charType === 'hiragana' ? item.h : item.k;

        if (currentMode === '1') {
            // 模式1：日文 ➔ 羅馬
            questionEl.innerText = getJpChar(currentQuestion);
            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt.r;
                btn.onclick = () => checkAnswer(btn, opt.r, currentQuestion.r);
                optionsContainer.appendChild(btn);
            });
        } else {
            // 模式2：羅馬 ➔ 日文
            questionEl.innerText = currentQuestion.r;
            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = getJpChar(opt);
                btn.onclick = () => checkAnswer(btn, getJpChar(opt), getJpChar(currentQuestion));
                optionsContainer.appendChild(btn);
            });
        }
    }

    // 檢查答案
    function checkAnswer(clickedBtn, selectedVal, correctVal) {
        // 鎖定所有按鈕，防止重複點擊
        const allBtns = document.querySelectorAll('.option-btn');
        allBtns.forEach(btn => btn.disabled = true);

        if (selectedVal === correctVal) {
            clickedBtn.classList.add('correct');
            score++;
            document.getElementById('score-display').innerText = `分數: ${score}`;
        } else {
            clickedBtn.classList.add('wrong');
            // 找出並標示正確答案
            allBtns.forEach(btn => {
                if (btn.innerText === correctVal) {
                    btn.classList.add('correct');
                }
            });
        }

        // 等待 0.5 秒 (500毫秒) 後判斷要進入下一題還是結束測驗
        setTimeout(() => {
            if (questionCount >= maxQuestions) {
                // 測驗結束，顯示成績並返回
                const accuracy = Math.round((score / maxQuestions) * 100);
                alert(`🎯 測驗結束！\n\n總題數：${maxQuestions} 題\n答對了：${score} 題\n正確率：${accuracy}%`);
                goBack();
            } else {
                nextQuestion();
            }
        }, 500);
    }

    // 返回設定
    function goBack() {
        document.getElementById('setup-screen').style.display = 'block';
        document.getElementById('quiz-screen').style.display = 'none';
    }
</script>

</body>
</html>
